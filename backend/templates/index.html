<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSN Studiestöd Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 { color: #003366; }
        #chat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .message { margin-bottom: 15px; }
        .user { color: #003366; font-weight: bold; }
        .bot { color: #333; }
        .sources { font-size: 0.8em; color: #888; margin-top: 5px; }
        #input-area { display: flex; gap: 10px; }
        #question { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button {
            padding: 10px 20px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #004488; }
    </style>
</head>
<body>
    <h1>CSN Studiestöd</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="question" placeholder="Ställ en fråga om studiestöd..." />
        <button onclick="sendMessage()">Skicka</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("question");
            const chatBox = document.getElementById("chat-box");
            const question = input.value.trim();
            if (!question) return;

            // Visa användarens fråga
            chatBox.innerHTML += `<div class="message"><span class="user">Du:</span> ${question}</div>`;
            input.value = "";

            // Skicka till API
            const response = await fetch("http://127.0.0.1:8001/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question })
            });

            const data = await response.json();

            // Visa svar och källor
            chatBox.innerHTML += `
                <div class="message">
                    <span class="bot">CSN Bot:</span> ${data.answer}
                    <div class="sources">Källor: ${data.sources.join(", ")}</div>
                </div>`;
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Skicka med Enter-tangenten
        document.getElementById("question").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
