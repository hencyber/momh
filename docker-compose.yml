# Runs backend and frontend services together

services:
  studiestod-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8001"
    command: uv run python -m momh.backend.app.studiestod.main

  aterbetalning-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8002:8002"
    command: uv run python -m momh.backend.app.aterbetalning.api


  utlandsstudier-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8003:8003"
    command: uv run python -m momh.backend.app.main

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000"
    command: mlflow ui --host 0.0.0.0 --port 5000

